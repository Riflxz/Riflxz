name: Update README cards

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate stats card
        uses: soulteary/github-readme-stats-action@v1.0.0
        with:
          card: stats
          options: username=Riflxz&theme=tokyonight&show_icons=true&hide_border=true&rank_icon=github&cache_seconds=21600
          path: .github/profile/stats.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate top-langs card
        uses: soulteary/github-readme-stats-action@v1.0.0
        with:
          card: top-langs
          options: username=Riflxz&theme=tokyonight&layout=compact&hide_border=true&cache_seconds=21600
          path: .github/profile/top-langs.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit cards
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .github/profile/*.svg
          git commit -m "Update README cards" || exit 0
          git push
